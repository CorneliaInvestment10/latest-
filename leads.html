<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lead Export</title><link rel="stylesheet" href="styles.css"></head><body><div class="admin"><h1>Cornelia Lead Export</h1><p>This page exports leads stored in this browser. For live client lead capture across all visitors, connect this form to Google Sheets, Airtable, HubSpot, Zoho, Mailchimp, or a database.</p><a class="button" href="index.html">Back to Website</a><button class="gold" onclick="downloadCSV()">Export CSV for Excel</button><button onclick="clearLeads()">Clear Leads in This Browser</button><div id="leadTable"></div></div><script>function leads(){return JSON.parse(localStorage.getItem('corneliaLeads')||'[]')}function render(){const data=leads();if(!data.length){document.getElementById('leadTable').innerHTML='<p>No leads saved in this browser yet.</p>';return;}const keys=[...new Set(data.flatMap(Object.keys))];let html='<table><thead><tr>'+keys.map(k=>'<th>'+k+'</th>').join('')+'</tr></thead><tbody>';data.forEach(r=>{html+='<tr>'+keys.map(k=>'<td>'+(r[k]||'')+'</td>').join('')+'</tr>'});html+='</tbody></table>';document.getElementById('leadTable').innerHTML=html}function downloadCSV(){const data=leads();if(!data.length){alert('No leads to export.');return;}const keys=[...new Set(data.flatMap(Object.keys))];const rows=[keys.join(',')].concat(data.map(r=>keys.map(k=>'"'+String(r[k]||'').replaceAll('"','""')+'"').join(',')));const blob=new Blob([rows.join('
')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cornelia-leads.csv';a.click();}function clearLeads(){if(confirm('Clear leads saved in this browser?')){localStorage.removeItem('corneliaLeads');render()}}render();</script></body></html>
